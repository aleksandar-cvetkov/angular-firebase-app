<mat-card>
    <mat-card-header>
        <mat-card-title>Статистика на профилот</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <div class="stat-item">
            <div class="stat-label">
                <span>Комплетност</span>
                <span>{{ completionPercentage() }}%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" [style.width.%]="completionPercentage()"></div>
            </div>
        </div>

        <hr>

        <div class="stats-grid">
            <div class="mini-stat">
                <span class="stat-value">{{ daysAsMember() }}</span>
                <span class="stat-title">Денови член</span>
            </div>

            <div class="mini-stat">
                <span class="stat-value">Бесплатна</span>
                <span class="stat-title">Претплата</span>
            </div>

            <div class="mini-stat">
                <span class="stat-value">Јавен</span>
                <span class="stat-title">Профил</span>
            </div>
        </div>

    </mat-card-content>

</mat-card>
