<mat-card>
    <mat-card-header>
        <mat-card-title>Пораки и известувања</mat-card-title>
        <span class="badge">3 нови</span>
    </mat-card-header>

    <mat-card-content class="pt-3">
        <div class="notification-items">
            <div class="notification-item unread">
                <div class="icon">🤖</div>
                <div class="content">
                    <p class="msg">Добредојдовте на платформата! Вашиот профил е успешно креиран.</p>
                    <span class="time">Пред 2 часа</span>
                </div>
            </div>

            <div class="notification-item unread">
                <div class="icon">🌟</div>
                <div class="content">
                    <p class="msg">Имате 80% комплетен профил. Додадете биографија за поголема видливост.</p>
                    <span class="time">Пред 5 часа</span>
                </div>
            </div>

            <div class="notification-item">
                <div class="icon">👤</div>
                <div class="content">
                    <p class="msg"><strong>Марко Петров</strong> го посети вашиот профил.</p>
                    <span class="time">Вчера</span>
                </div>
            </div>
        </div>
        <button class="view-all">Види ги сите известувања</button>
    </mat-card-content>
</mat-card>
