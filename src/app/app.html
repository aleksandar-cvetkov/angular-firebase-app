<div class="container mt-4">
  @if (userId()) {
    <div class="menu-holder mb-3">
      <button matButton class="menu-button" [matMenuTriggerFor]="menu">Здраво {{ userName() || userEmail() }}</button>
      <mat-menu #menu="matMenu" xPosition="before">
        <button mat-menu-item (click)="goToProfile()">Профил</button>
        <button mat-menu-item (click)="goToEditProfile()">Уреди профил</button>
        <button mat-menu-item (click)="logout()">Одјави се</button>
      </mat-menu>
    </div>
  }
  
  <router-outlet></router-outlet>
</div>
