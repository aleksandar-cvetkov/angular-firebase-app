<div class="d-flex justify-content-center mt-5">
    <mat-card class="p-4" style="width: 400px;">
        <h2 class="mb-4">Reset password</h2>
        <form [formGroup]="resetPassForm" (ngSubmit)="onSubmit()">
            <p>for user: {{ verifiedEmail }}</p>

            <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label>Password</mat-label>
                <input matInput formControlName="password" type="password" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label>Confirm Password</mat-label>
                <input matInput formControlName="confirmPassword" type="password" />
            </mat-form-field>

            <button mat-raised-button color="primary" class="w-100" type="submit" [disabled]="resetPassForm.invalid">
                Reset password
            </button>
        </form>
    </mat-card>
</div>
