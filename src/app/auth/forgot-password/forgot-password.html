<div class="d-flex justify-content-center mt-5">
    <mat-card class="p-4" style="width: 400px;">
        <h2 class="mb-4 text-center">Forgot Password</h2>
        <p class="text-muted text-center mb-4">
            Enter your email and we'll send you a link to reset your password.
        </p>

        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label>Email</mat-label>
                <input matInput formControlName="email" type="email" placeholder="you@example.com" />

                @if (forgotForm.controls.email.hasError('required')) {
                <mat-error>Email is required.</mat-error>
                }
                @if (forgotForm.controls.email.hasError('email')) {
                <mat-error>Please enter a valid email address.</mat-error>
                }
            </mat-form-field>

            <button mat-raised-button color="accent" class="w-100" type="submit"
                [disabled]="forgotForm.invalid || isSubmitting() || forgotForm.disabled">
                @if (isSubmitting()) {
                Sending...
                } @else {
                Send Reset Link
                }
            </button>
            <button matButton color="primary" class="w-100 mt-2" routerLink="/login">Back to Login</button>

        </form>
    </mat-card>
</div>
