<div class="d-flex justify-content-center mt-5">
    <mat-card class="p-4" style="width: 400px;">
        <h2 class="mb-4">Forgot Password</h2>
        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label>Email</mat-label>
                <input matInput formControlName="email" type="email" />
            </mat-form-field>

            <button mat-raised-button color="accent" class="w-100" type="submit" [disabled]="forgotForm.invalid">
                Reset Password
            </button>
            <button matButton color="primary" class="w-100 mt-2" routerLink="/login">Cancel</button>

        </form>
    </mat-card>
</div>
