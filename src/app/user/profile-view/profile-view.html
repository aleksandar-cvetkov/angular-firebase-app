<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      @if (userProfile$ | async; as profile) {
      <mat-card>
        <mat-card-header>
          <div mat-card-avatar>
            <img [src]="profile.photoUrl || 'assets/default-avatar.png'" alt="Profile Picture" class="rounded-circle"
              width="60" height="60" />
          </div>
          <mat-card-title>{{ profile.firstName }} {{ profile.lastName }}</mat-card-title>
          <mat-card-subtitle>{{ profile.profession || 'Нема професија' }}</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <p><strong>Место на живеење:</strong> {{ profile.location || '-' }}</p>
          <p><strong>Хоби:</strong>
            @for (hobby of profile.hobbies; track $index) {
              <span>&nbsp; {{ hobby }} &nbsp;</span>
            }
          </p>
        </mat-card-content>

        <mat-card-actions>
          <button mat-raised-button color="primary" routerLink="/profile/edit">
            Уреди профил
          </button>
        </mat-card-actions>
      </mat-card>
      } @else {
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
      }
    </div>
  </div>
</div>
