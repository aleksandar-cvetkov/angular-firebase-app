<div class="container mt-4">
    <mat-card class="p-4">

        <h2>Edit Profile</h2>
        <form [formGroup]="profileForm" (ngSubmit)="onSave()">
            <div class="row">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>First Name</mat-label>
                        <input matInput formControlName="firstName" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Last Name</mat-label>
                        <input matInput formControlName="lastName" />
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Profession</mat-label>
                        <input matInput formControlName="profession" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Hobby</mat-label>
                        <input matInput formControlName="hobbies" />
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Location</mat-label>
                        <input matInput formControlName="location" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <label for="photo" class="form-label">Profile Photo</label>
                    <input type="file" class="form-control" (change)="onFileSelected($event)">
                    <!-- Preview слика -->
                    @if (previewUrl) {
                    <div class="mt-3">
                        <p>Preview:</p>
                        <img [src]="previewUrl" alt="Preview" class="img-thumbnail" style="max-width: 200px;">
                    </div>
                    }
                </div>
            </div>

            <div class="row">

            </div>

            <div class="mt-3 d-flex justify-content-center">
                <button mat-raised-button color="primary" type="submit" [disabled]="profileForm.invalid">
                    Save Changes
                </button>
            </div>
        </form>
    </mat-card>
</div>
