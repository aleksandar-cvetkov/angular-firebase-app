<div class="container mt-4">
    <mat-card class="p-4">

        <h2>Edit Profile</h2>
        <form [formGroup]="profileForm" (ngSubmit)="onSave()">
            <div class="row">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>First Name</mat-label>
                        <input matInput formControlName="firstName" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Last Name</mat-label>
                        <input matInput formControlName="lastName" />
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Profession</mat-label>
                        <input matInput formControlName="profession" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Bio</mat-label>
                        <textarea matInput formControlName="bio"></textarea>
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Location</mat-label>
                        <input matInput formControlName="location" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <label for="photo" class="form-label">Profile Photo</label>
                    <!-- Preview слика -->
                    @if (previewUrl) {
                        <div class="mt-3 preview-img">
                            <button matIconButton type="button" (click)="onRemovePhoto()">
                                <mat-icon>close</mat-icon>
                            </button>
                            <img [src]="previewUrl" alt="Preview" class="img-thumbnail" style="max-width: 200px;">
                        </div>
                    } @else {
                        <input type="file" class="form-control" (change)="onFileSelected($event)">
                    }
                </div>
            </div>

            <div class="mt-3 d-flex justify-content-center">
                <button mat-raised-button color="primary" type="submit" [disabled]="profileForm.invalid || profileForm.pristine">
                    Save Changes
                </button>
            </div>
        </form>
    </mat-card>
</div>
